services:

  # ── Banco de dados ─────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: pdv_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: pdv
    volumes:
      - pdv_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d pdv"]
      interval: 5s
      timeout: 5s
      retries: 20

  # ── App Next.js ────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: pdv_app
    restart: unless-stopped
    ports:
      - "80:3000"
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD}@db:5432/pdv
      SESSION_SECRET: ${SESSION_SECRET}
      # Cloudflare R2 — fotos de produto (0016F). Valores vêm do /opt/pdv/.env
      R2_ACCOUNT_ID: ${R2_ACCOUNT_ID}
      R2_BUCKET: ${R2_BUCKET}
      R2_ACCESS_KEY_ID: ${R2_ACCESS_KEY_ID}
      R2_SECRET_ACCESS_KEY: ${R2_SECRET_ACCESS_KEY}
      R2_PUBLIC_URL: ${R2_PUBLIC_URL}
    depends_on:
      db:
        condition: service_healthy

volumes:
  pdv_pgdata:
