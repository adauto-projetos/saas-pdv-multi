upstream pdv_app      { server pdv_app:3000; }
upstream rpm_frontend { server rpmcontrol-frontend:3001; }
upstream rpm_backend  { server rpmcontrol-backend:3000; }

# ── PDV ──────────────────────────────────────────────────────────────────────
server {
    listen 80;
    server_name pdv.art.br;
    client_max_body_size 10M;

    location / {
        proxy_pass         http://pdv_app;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}

# ── rpmcontrol frontend ───────────────────────────────────────────────────────
server {
    listen 80;
    server_name app.rpmcontrol.com.br;
    client_max_body_size 10M;

    location / {
        proxy_pass         http://rpm_frontend;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}

# ── rpmcontrol backend API ────────────────────────────────────────────────────
server {
    listen 80;
    server_name api.rpmcontrol.com.br;
    client_max_body_size 50M;

    location / {
        proxy_pass         http://rpm_backend;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}
