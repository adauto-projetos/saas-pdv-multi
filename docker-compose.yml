services:
  db:
    image: postgres:16
    container_name: pdv_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: pdv
    ports:
      - "5432:5432"
    volumes:
      - pdv_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d pdv"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  pdv_pgdata:
